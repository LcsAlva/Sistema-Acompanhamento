# Alembic config — gerência de migrações de schema do URFCC.
# As migrações ficam em backend/migrations/versions; cada uma documenta
# uma alteração estrutural (CREATE/ALTER/DROP). Use:
#   alembic revision --autogenerate -m "descrição"
#   alembic upgrade head
#   alembic downgrade -1

[alembic]
script_location = backend/migrations
prepend_sys_path = .
sqlalchemy.url =
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# A URL real do banco vem programaticamente de backend.database para
# respeitar o caminho do .exe (PyInstaller). Deixe vazio acima.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
